version: '3.8'

services:
  # STDIO transport service (for direct integration)
  duckduckgo-stdio:
    build: .
    container_name: duckduckgo-mcp-stdio
    image: duckduckgo-mcp-server:latest
    command: ["python", "-m", "duckduckgo_mcp_server.server", "--transport", "stdio"]
    profiles:
      - stdio
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=INFO
    networks:
      - mcp-network

  # HTTP transport service
  duckduckgo-http:
    build: .
    container_name: duckduckgo-mcp-http
    image: duckduckgo-mcp-server:latest
    command: ["python", "-m", "duckduckgo_mcp_server.server", "--transport", "http", "--host", "0.0.0.0", "--port", "8080"]
    profiles:
      - http
      - all
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=INFO
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SSE transport service
  duckduckgo-sse:
    build: .
    container_name: duckduckgo-mcp-sse
    image: duckduckgo-mcp-server:latest
    command: ["python", "-m", "duckduckgo_mcp_server.server", "--transport", "sse", "--host", "0.0.0.0", "--port", "8081"]
    profiles:
      - sse
      - all
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=INFO
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Hybrid service (runs both HTTP and SSE)
  duckduckgo-hybrid:
    build: .
    container_name: duckduckgo-mcp-hybrid
    image: duckduckgo-mcp-server:latest
    command: ["python", "-m", "duckduckgo_mcp_server.server", "--transport", "hybrid"]
    profiles:
      - hybrid
      - production
    restart: unless-stopped
    ports:
      - "8080:8080"  # HTTP
      - "8081:8081"  # SSE
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=INFO
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: duckduckgo-nginx
    profiles:
      - production
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - duckduckgo-hybrid
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for rate limiting (optional enhancement)
  redis:
    image: redis:7-alpine
    container_name: duckduckgo-redis
    profiles:
      - production
      - enhanced
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local