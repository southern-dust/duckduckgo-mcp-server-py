version: '3.8'

services:
  # Unified DuckDuckGo MCP Server - supports all transport protocols
  duckduckgo-mcp:
    build: .
    container_name: duckduckgo-mcp-server
    image: duckduckgo-mcp-server:unified
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRANSPORT_MODE=${TRANSPORT_MODE:-auto}
      - HTTP_HOST=${HTTP_HOST:-0.0.0.0}
      - HTTP_PORT=${HTTP_PORT:-8080}
      - SSE_HOST=${SSE_HOST:-0.0.0.0}
      - SSE_PORT=${SSE_PORT:-8081}
    networks:
      - mcp-network
    ports:
      - "${HTTP_PORT:-8080}:8080"  # HTTP
      - "${SSE_PORT:-8081}:8081"  # SSE

  # STDIO transport service (for direct integration)
  duckduckgo-stdio:
    extends: duckduckgo-mcp
    container_name: duckduckgo-mcp-stdio
    environment:
      - TRANSPORT_MODE=stdio
    profiles:
      - stdio
      - legacy
    ports: []  # No ports needed for stdio

  # HTTP transport service
  duckduckgo-http:
    extends: duckduckgo-mcp
    container_name: duckduckgo-mcp-http
    environment:
      - TRANSPORT_MODE=http
      - HTTP_PORT=${HTTP_PORT:-8080}
    profiles:
      - http
      - single
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SSE transport service
  duckduckgo-sse:
    extends: duckduckgo-mcp
    container_name: duckduckgo-mcp-sse
    environment:
      - TRANSPORT_MODE=sse
      - SSE_PORT=${SSE_PORT:-8081}
    profiles:
      - sse
      - single
    ports:
      - "${SSE_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Hybrid service (runs both HTTP and SSE in single process)
  duckduckgo-hybrid:
    extends: duckduckgo-mcp
    container_name: duckduckgo-mcp-hybrid
    environment:
      - TRANSPORT_MODE=hybrid
      - HTTP_PORT=${HTTP_PORT:-8080}
      - SSE_PORT=${SSE_PORT:-8081}
    profiles:
      - hybrid
      - production
      - unified
    ports:
      - "${HTTP_PORT:-8080}:8080"  # HTTP
      - "${SSE_PORT:-8081}:8081"  # SSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Multi-process service (runs all transports in separate processes)
  duckduckgo-multi:
    extends: duckduckgo-mcp
    container_name: duckduckgo-mcp-multi
    environment:
      - TRANSPORT_MODE=multi
      - HTTP_PORT=${HTTP_PORT:-8080}
      - SSE_PORT=${SSE_PORT:-8081}
    profiles:
      - multi
      - advanced
    ports:
      - "${HTTP_PORT:-8080}:8080"  # HTTP
      - "${SSE_PORT:-8081}:8081"  # SSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Auto-detect service (automatically selects best transport)
  duckduckgo-auto:
    extends: duckduckgo-mcp
    container_name: duckduckgo-mcp-auto
    environment:
      - TRANSPORT_MODE=auto
      - HTTP_PORT=${HTTP_PORT:-8080}
      - SSE_PORT=${SSE_PORT:-8081}
    profiles:
      - auto
      - default
      - smart
    ports:
      - "${HTTP_PORT:-8080}:8080"  # HTTP
      - "${SSE_PORT:-8081}:8081"  # SSE
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8080/health 2>/dev/null || curl -f http://localhost:8081/health 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: duckduckgo-nginx
    profiles:
      - production
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - duckduckgo-hybrid
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for rate limiting (optional enhancement)
  redis:
    image: redis:7-alpine
    container_name: duckduckgo-redis
    profiles:
      - production
      - enhanced
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local